<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css?v=7">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ site.baseurl }}/" class="site-title">India Geodata</a>
      <nav class="site-nav">
        <a href="{{ site.baseurl }}/">Home</a>
        <a href="{{ site.baseurl }}/about">About</a>
        <a href="https://github.com/yashveeeeeer/india-geodata" target="_blank" rel="noopener" class="nav-github">GitHub</a>
      </nav>
    </div>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="container">
      <p>India Geodata is licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.</p>
      <p>Built with open data from India's government portals and community projects.</p>
    </div>
  </footer>

  {% if page.url == "/" %}
  <script src="{{ site.baseurl }}/assets/js/catalog.js?v=2"></script>
  {% endif %}
</body>
</html>
